name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # npm install (not npm ci) to match Vercel's own installCommand in vercel.json —
      # keeps the lockfile self-healing against package.json rather than requiring a
      # manually-regenerated lockfile to be committed in lockstep with every bump.
      - run: npm install
      - name: Build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci_dummy_secret_ci_dummy_secret_ci_dummy_
        run: npx next build
      # audit-level=critical, not high: `npm audit` currently reports a bundle of
      # high-severity Next.js advisories (GHSA-9g9p-9gw9-jx7f and others) whose
      # only fix is a major-version jump (next@16, likely forcing React 19 too) —
      # a breaking, architecturally significant change tracked separately rather
      # than force-gated here. This still fails the build on anything critical.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical
